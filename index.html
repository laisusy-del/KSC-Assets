function dedupeById(arr){ const seen=new Set(); return (arr||[]).filter(r=>{if(!r||seen.has(r.id))return false;seen.add(r.id);return true;}); }
function applySortConfig(arr,config,getVal){
  if(!config)return arr;
  return [...arr].sort((a,b)=>{
    const va=getVal(a),vb=getVal(b);
    if(typeof va==="number"&&typeof vb==="number") return config.dir==="asc"?va-vb:vb-va;
    return config.dir==="asc"?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va));
  });
}
function dedupeData(d){ return { stocks:dedupeById(d.stocks), bank:dedupeById(d.bank), fixed:dedupeById(d.fixed), mortgage:dedupeById(d.mortgage), insurance:dedupeById(d.insurance), expense:dedupeById(d.expense), travel:dedupeById(d.travel) }; }

function formatTWD(val) {
  if (!val && val !== 0) return "—";
  return "$ " + Number(val).toLocaleString("zh-TW");
}
function formatCurrency(val, currency) {
  if (!val && val !== 0) return "—";
  const n = Number(val);
  if (currency === "TWD" || !currency) return "$ " + n.toLocaleString("zh-TW");
  if (currency === "JPY") return "¥ " + n.toLocaleString("zh-TW");
  if (currency === "USD") return "$ " + n.toLocaleString("en-US");
  if (currency === "EUR") return "€ " + n.toLocaleString("de-DE");
  return currency + " " + n.toLocaleString("zh-TW");
}
// Convert any currency amount to TWD
function toTWD(amount, currency, exchangeRate) {
  if (!currency || currency === "TWD") return Number(amount) || 0;
  const rate = Number(exchangeRate) || 1;
  return Math.round((Number(amount) || 0) * rate);
}
function sumBy(arr, owner) {
  return (arr||[]).filter(r=>!owner||r.owner===owner).reduce((s,r)=>s+(Number(r.amount)||0),0);
}
// Sum in TWD (handles foreign currency)
function sumByTWD(arr, owner) {
  return (arr||[]).filter(r=>!owner||r.owner===owner).reduce((s,r)=>s+toTWD(r.amount, r.currency, r.exchangeRate),0);
}
function toMonthly(amount, freq) {
  const a=Number(amount)||0;
  switch(freq){ case "每月":return a; case "每季":return Math.round(a/3); case "每半年":return Math.round(a/6); case "每年":return Math.round(a/12); default:return 0; }
}
function formatDateTime(iso) {
  if(!iso)return "—";
  const d=new Date(iso);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

function dataToCSV(data) {
  const rows=["類別,持有人,名稱,金額,補充1,補充2,補充3,備註,ID"];
  data.stocks.forEach(r=>rows.push(["股票",r.owner,`${r.name||""}(${r.ticker||""})`,r.amount||0,`類型:${r.type||"股票"}`,`成本:${r.cost||""}`,``,r.note||"",r.id].join(",")));
  data.bank.forEach(r=>rows.push(["銀行存款",r.owner,r.bank||"",r.amount||0,`末五碼:${r.account||""}|分行:${r.branch||""}`,`幣別:${r.currency||"TWD"}`,`匯率:${r.exchangeRate||""}`,r.note||"",r.id].join(",")));
  data.fixed.forEach(r=>rows.push(["定存",r.owner,r.bank||"",r.amount||0,`利率:${r.rate||""}%|分行:${r.branch||""}`,`幣別:${r.currency||"TWD"}`,`匯率:${r.exchangeRate||""}|起始日:${r.startDate||""}|到期日:${r.endDate||""}`,r.note||"",r.id].join(",")));
  (data.mortgage||[]).forEach(r=>rows.push(["房貸",r.owner,r.houseName||r.bank||"",r.totalAmount||0,`每月:${r.monthlyPayment||""}|總期:${r.totalMonths||""}|已繳:${r.paidMonths||""}|銀行:${r.bank||""}`,`利率:${r.rate||""}|起貸:${r.startDate||""}|房價:${r.housePrice||""}|自備款:${r.downPayment||""}`,`剩餘本金:${r.remainingPrincipal||""}|預估利息:${r.estimatedInterest||""}|已繳更新:${r.paidMonthsUpdatedAt||""}`,r.note||"",r.id].join(",")));
  data.insurance.forEach(r=>rows.push(["保單",r.owner,r.product||"",r.periodAmount||r.premium||0,`保額:${r.amount||""}|公司:${r.company||""}|被保人:${r.insured||""}`,`類型:${r.type||"壽險"}|幣別:${r.currency||"TWD"}|匯率:${r.exchangeRateIns||""}`,`總期:${r.totalPeriods||""}|已繳:${r.paidPeriods||""}|扣款月:${r.paymentMonths||""}|最後繳:${r.lastPaymeTWDate||""}|狀態:${r.status||"未繳完"}`,r.note||"",r.id].join(",")));
  (data.expense||[]).forEach(r=>rows.push(["固定開銷",r.payer||"共同",r.name||"",r.amount||0,`類別:${r.category||""}`,`頻率:${r.freq||"每月"}`,``,r.note||"",r.id].join(",")));
  (data.travel||[]).forEach(r=>rows.push(["出國紀錄","",r.destination||"",r.totalAmount||0,`日期:${r.dateRange||""}`,`人數:${r.travelers||""}`,``,r.note||"",r.id].join(",")));
  return rows.join("\n");
}

// 把 GAS 回傳的二維 rows 陣列解析回 {stocks:[], bank:[], ...} 物件
function parseRowsToData(rows) {
  // rows[0] 是 header，從 rows[1] 開始是資料
  const result = { stocks:[], bank:[], fixed:[], mortgage:[], insurance:[], expense:[], travel:[] };
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || !r[0]) continue;
    const type  = String(r[0] || "").trim();
    const owner = String(r[1] || "").trim();
    const name  = String(r[2] || "").trim();
    const amount= r[3];
    const sup1  = String(r[4] || "");
    const sup2  = String(r[5] || "");
    const sup3  = String(r[6] || "");
    const note  = String(r[7] || "").trim();
    const id    = String(r[8] || Date.now() + i);

    function val(str, key) {
      const m = str.match(new RegExp(key + ":([^|,]*)"));
      return m ? m[1].trim() : "";
    }

    if (type === "股票") {
      result.stocks.push({ id, owner, name: name.replace(/\(.*\)$/,"").trim(),
        ticker: (name.match(/\((.+)\)$/)||[])[1]||"",
        amount: Number(amount)||0, type: val(sup1,"類型")||"股票",
        cost: val(sup1,"成本"), note });
    } else if (type === "銀行存款") {
      const bankRate = val(sup3,"匯率") || val(sup2,"匯率");
      if(val(sup2,"幣別")!=="TWD"&&val(sup2,"幣別")) console.log("🏦 銀行外幣解析 sup2="+sup2+" sup3="+sup3+" rate="+bankRate);
      result.bank.push({ id, owner, bank: name, branch: val(sup1,"分行"), account: val(sup1,"末五碼"),
        amount: Number(amount)||0, currency: val(sup2,"幣別")||"TWD",
        exchangeRate: bankRate, note });
    } else if (type === "定存") {
      const fixedRate = val(sup3,"匯率") || val(sup2,"匯率");
      const fixedEnd = val(sup3,"到期日");
      const fixedStart = val(sup3,"起始日");
      console.log(`🔒 定存[${name}] sup3原始值="${sup3}" → 匯率="${fixedRate}" 起始日="${fixedStart}" 到期日="${fixedEnd}"`);
      result.fixed.push({ id, owner, bank: name, branch: val(sup1,"分行"), amount: Number(amount)||0,
        rate: val(sup1,"利率").replace("%",""), currency: val(sup2,"幣別")||"TWD",
        exchangeRate: fixedRate, endDate: fixedEnd, startDate: fixedStart, note });
    } else if (type === "房貸") {
      result.mortgage.push({ id, owner, houseName: name,
        totalAmount: Number(amount)||0,
        monthlyPayment: val(sup1,"每月"), totalMonths: val(sup1,"總期"),
        paidMonths: val(sup1,"已繳"), bank: val(sup1,"銀行"),
        rate: val(sup2,"利率"), startDate: val(sup2,"起貸"),
        housePrice: val(sup2,"房價"), downPayment: val(sup2,"自備款"),
        remainingPrincipal: val(sup3,"剩餘本金"),
        estimatedInterest: val(sup3,"預估利息"),
        paidMonthsUpdatedAt: val(sup3,"已繳更新"), note });
    } else if (type === "保單") {
      result.insurance.push({ id, owner, product: name,
        periodAmount: Number(amount)||0,
        amount: val(sup1,"保額"), company: val(sup1,"公司"), insured: val(sup1,"被保人"),
        type: val(sup2,"類型")||"壽險", currency: val(sup2,"幣別")||"TWD",
        exchangeRateIns: val(sup2,"匯率"),
        totalPeriods: val(sup3,"總期"), paidPeriods: val(sup3,"已繳"),
        paymentMonths: val(sup3,"扣款月"), lastPaymeTWDate: val(sup3,"最後繳"),
        status: val(sup3,"狀態")||"未繳完", note });
    } else if (type === "固定開銷") {
      result.expense.push({ id, payer: owner||"共同", name,
        amount: Number(amount)||0, category: val(sup1,"類別"),
        freq: val(sup2,"頻率")||"每月", note });
    } else if (type === "出國紀錄") {
      result.travel.push({ id, destination: name,
        totalAmount: Number(amount)||0,
        dateRange: val(sup1,"日期"), travelers: val(sup2,"人數"), note });
    }
  }
  return result;
}

async function loadFromGoogleDrive() {
  try {
    const pwd = localStorage.getItem("asset_password") || DEFAULT_PASSWORD;
    const res = await fetch(MY_GAS_URL + "?pwd=" + encodeURIComponent(pwd));
    const result = await res.json();

    if (!result || result.success !== true) {
      console.error("❌ GAS 拒絕存取:", result ? result.error : "無回應");
      return null;
    }

    // data 是二維 rows 陣列
    if (Array.isArray(result.data) && result.data.length > 1) {
      const parsed = parseRowsToData(result.data);
      console.log("✅ 解析完成，筆數:", Object.entries(parsed).map(([k,v])=>k+":"+v.length).join(", "));
      return parsed;
    }

    console.error("❌ GAS data 格式異常:", result.data);
    return null;
  } catch (err) {
    console.error("loadFromGoogleDrive 異常:", err);
    return null;
  }
}

function CurrencyExchangeFields({currency,exchangeRate,amount,onCurrencyChange,onRateChange}){
  if(!currency||currency==="TWD")return null;
  const TWD = toTWD(amount, currency, exchangeRate);
  return(
    <div style={{marginBottom:14}}>
      <label style={labelStyle}>匯率（1 {currency} = ? TWD）</label>
      <div style={{display:"flex",gap:10,alignItems:"center"}}>
        <input type="number" value={exchangeRate||""} onChange={e=>onRateChange(e.target.value)}
          onFocus={e=>e.target.select()} placeholder={`e.g. ${currency==="USD"?"31":currency==="JPY"?"0.21":"匯率"}`}
          style={{...inputStyle,flex:1}}/>

function ChangePasswordModal({onSave,onClose}){
  const [current,setCurrent]=useState(""),  [next,setNext]=useState(""),  [confirm,setConfirm]=useState(""),  [error,setError]=useState("");
  const storedPw=localStorage.getItem("asset_password")||DEFAULT_PASSWORD;
  const [loading, setLoading] = useState(false);
  const submit = () => {
    if (!current) { setError("請輸入目前密碼"); return; }
    if (!next) { setError("請輸入新密碼"); return; }
    if (next !== confirm) { setError("兩次新密碼不一致"); return; }
    setLoading(true);
    const postBody = { pwd: current.trim(), action: "changePassword", newPwd: next.trim() };
    console.log("🔑 送出修改密碼 payload:", JSON.stringify(postBody));
    fetch(MY_GAS_URL, {
      method: "POST",
      body: JSON.stringify(postBody)
    })
    .then(r => r.json())
    .then(r => {
      setLoading(false);
      if (r.success) {
        localStorage.setItem("asset_password", next);
        onSave();
      } else {
        setError("失敗：" + (r.error || "未知錯誤"));
      }
    })
    .catch(() => { setLoading(false); setError("連線失敗，請稍後再試"); });
  };



  return(<ModalShell title="🔑 修改密碼" onClose={onClose}>
    <div style={{marginBottom:14}}><label style={labelStyle}>目前密碼</label><input type="password" value={current} onChange={e=>{setCurrent(e.target.value);setError("");}} style={{...inputStyle,letterSpacing:6,textAlign:"center"}} placeholder="輸入目前密碼"/></div>
    <div style={{marginBottom:14}}><label style={labelStyle}>新密碼</label><input type="password" value={next} onChange={e=>{setNext(e.target.value);setError("");}} style={{...inputStyle,letterSpacing:6,textAlign:"center"}} placeholder="輸入新密碼"/></div>
    <div style={{marginBottom:14}}><label style={labelStyle}>確認新密碼</label><input type="password" value={confirm} onChange={e=>{setConfirm(e.target.value);setError("");}} style={{...inputStyle,letterSpacing:6,textAlign:"center"}} placeholder="再輸入一次新密碼"/></div>
    {error&&<p style={{color:C.danger,fontSize:13,textAlign:"center",margin:"0 0 12px"}}>{error}</p>}
    <BrownBtn onClick={submit}>{loading?"⏳ 更新中…":"確認修改"}</BrownBtn>
    <div style={{height:8}}/><BrownBtn onClick={onClose} variant="ghost">取消</BrownBtn>
  </ModalShell>);
}

function PasswordScreen({onUnlock}){
  const [pw,setPw]=useState(""),  [error,setError]=useState(false),  [shake,setShake]=useState(false), [loading,setLoading]=useState(false);
  const submit=()=>{
    if(!pw||loading) return;
    setLoading(true);
    setError(false);
    const checkUrl = MY_GAS_URL + "?pwd=" + encodeURIComponent(pw);
    fetch(checkUrl)
      .then(res => res.json())
      .then(res => {
        if (res.success) {
          localStorage.setItem("asset_password", pw);
          if(res.data && typeof res.data==="object" && !Array.isArray(res.data)){
            localStorage.setItem("asset_data", JSON.stringify(res.data));
          }
          onUnlock();
        } else {
          setLoading(false);
          setError(true);
          setShake(true);
          setPw("");
          setTimeout(() => setShake(false), 500);
        }
      })
      .catch(() => {
        setLoading(false);
        alert("連線失敗，請檢查網路或 GAS 部署設定");
      });
  };
  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <style>{`@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}`}</style>
      <div style={{fontSize:52,marginBottom:12}}>🏠</div>
      <h1 style={{color:C.brownDark,fontSize:22,fontWeight:900,margin:"0 0 4px"}}>家庭資產管理</h1>
      <p style={{color:C.textMuted,fontSize:13,marginBottom:36}}>請輸入密碼以繼續</p>
      <div style={{width:"100%",maxWidth:320,animation:shake?"shake 0.4s ease":"none"}}>
        <div style={{...cardStyle,padding:28}}>
          <label style={{...labelStyle,textAlign:"center",display:"block",marginBottom:12}}>🔑 密碼</label>
          <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setError(false);}} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="請輸入密碼" autoFocus disabled={loading}
            style={{...inputStyle,textAlign:"center",fontSize:22,letterSpacing:8,border:error?`2px solid ${C.danger}`:inputStyle.border,opacity:loading?0.6:1}}/>
          {error&&<p style={{color:C.danger,fontSize:13,textAlign:"center",margin:"8px 0 0"}}>密碼錯誤，請再試一次</p>}
          <div style={{marginTop:16}}><BrownBtn onClick={submit}>{loading?"⏳ 驗證中…":"確認進入"}</BrownBtn></div>
        </div>
      </div>
    </div>
  );
}

  const CurrSubtotal=({arr})=>{

      const c=r.currency||"TWD";

        {["all",...allCurrencies].map(c=>(
          <button key={c} onClick={()=>setCurrFilter(c)} style={{padding:"3px 10px",borderRadius:12,border:`1px solid ${currFilter===c?C.brownDark:C.border}`,cursor:"pointer",fontFamily:"inherit",fontSize:12,background:currFilter===c?C.brownDark:"transparent",color:currFilter===c?"#fff":C.textMuted}}>
            {c==="all"?"全部":c==="TWD"?"TWD":c}
          </button>
        ))}
      </div>
    )}

    {/* 銀行存款 */}
    {subTab==="bank"&&<>
      <div style={{display:"flex",gap:10,marginBottom:10,flexWrap:"wrap"}}>
        <StatPill label="👨 KK" value={bankTWD(data.bank,"KK")} color={C.KK}/>
        <StatPill label="👩 SS" value={bankTWD(data.bank,"SS")} color={C.SS}/>
        <StatPill label="👦 BB" value={bankTWD(data.bank,"BB")} color={C.child}/>
        <StatPill label="合計TWD" value={bankTWD(data.bank)} color={C.total}/>
      </div>
      <CurrSubtotal arr={filterByCurr(data.bank)}/>
      <SortBar tab="bank" sortConfig={sortConfig} onSort={toggleSort} fields={[{key:"bank",label:"銀行名稱"},{key:"amount",label:"金額"},{key:"owner",label:"持有人"}]}/>
      {(()=>{const sc=sortConfig["bank"];const arr=filterByCurr(data.bank);const sorted=applySortConfig(arr,sc,r=>sc&&sc.field==="bank"?r.bank:sc&&sc.field==="owner"?r.owner:toTWD(r.amount,r.currency,r.exchangeRate));return !sorted.length?<div style={{textAlign:"center",color:C.textMuted,padding:"40px 0",fontSize:14}}>尚無存款紀錄</div>:sorted.map(r=><RowCard key={r.id} row={r} fields={bankFields} onEdit={r=>{setEditItem(r);setModal("bank")}} onDelete={id=>deleteItem("bank",id)}/>);})()}
    </>}

    {/* 定存 */}
    {subTab==="fixed"&&<>
      <div style={{display:"flex",gap:10,marginBottom:10,flexWrap:"wrap"}}>
        <StatPill label="👨 KK" value={fixedTWD(data.fixed,"KK")} color={C.KK}/>
        <StatPill label="👩 SS" value={fixedTWD(data.fixed,"SS")} color={C.SS}/>
        <StatPill label="👦 BB" value={fixedTWD(data.fixed,"BB")} color={C.child}/>
        <StatPill label="合計TWD" value={fixedTWD(data.fixed)} color={C.total}/>
      </div>
      <CurrSubtotal arr={filterByCurr(data.fixed)}/>
      <SortBar tab="fixed" sortConfig={sortConfig} onSort={toggleSort} fields={[{key:"bank",label:"銀行名稱"},{key:"amount",label:"金額"},{key:"rate",label:"利率"},{key:"endDate",label:"到期日"}]}/>
      {(()=>{const sc=sortConfig["fixed"];const arr=filterByCurr(data.fixed);const sorted=applySortConfig(arr,sc,r=>sc&&sc.field==="bank"?r.bank:sc&&sc.field==="rate"?Number(r.rate)||0:sc&&sc.field==="endDate"?r.endDate||"":toTWD(r.amount,r.currency,r.exchangeRate));return !sorted.length?<div style={{textAlign:"center",color:C.textMuted,padding:"40px 0",fontSize:14}}>尚無定存紀錄</div>:sorted.map(r=><RowCard key={r.id} row={r} fields={fixedFields} onEdit={r=>{setEditItem(r);setModal("fixed")}} onDelete={id=>deleteItem("fixed",id)}/>);})()}
    </>}

    {/* 銀行統計 */}
    {subTab==="summary"&&<BankSummary/>}
  </SectionHeader>;
}

function App(){
  const [unlocked,setUnlocked]=useState(()=>sessionStorage.getItem("asset_unlocked")==="1");
  const [tab,setTab]=useState("dashboard");
  const [ownerFilter,setOwnerFilter]=useState("all");
  const [data,setData]=useState(()=>{
    try{
      const raw=dedupeData({...DEFAULT_DATA,...JSON.parse(localStorage.getItem("asset_data"))});
      const validFreqs=["每月","每季","每半年","每年","單次"];
      raw.expense=(raw.expense||[]).map(r=>{
        const f=String(r.freq||"");
        const matched=validFreqs.find(v=>f.includes(v));
        return {...r,freq:matched||"每月"};
      });
      return raw;
    }catch{return DEFAULT_DATA;}
  });
  const [lastUpdated,setLastUpdated]=useState(()=>localStorage.getItem("asset_last_updated")||null);
  const [modal,setModal]=useState(null);
  const [editItem,setEditItem]=useState(null);
  const [syncStatus,setSyncStatus]=useState("idle");
  const [cloudLoaded,setCloudLoaded]=useState(false); // 本 session 是否已從雲端載入
  const [pwChanged,setPwChanged]=useState(false);
  const [expenseFreqFilter,setExpenseFreqFilter]=useState("全部");
  const [sortConfig,setSortConfig]=useState({});
  const toggleSort=(tab,field)=>setSortConfig(p=>{const cur=p[tab];const next=cur&&cur.field===field?(cur.dir==="asc"?"desc":null):("asc");return next?{...p,[tab]:{field,dir:next}}:{...p,[tab]:null};});
  const syncTimer=useRef(null);

  useEffect(()=>{localStorage.setItem("asset_data",JSON.stringify(data));},[data]);

  const triggerSync=useCallback((newData)=>{
    if(syncTimer.current)clearTimeout(syncTimer.current);
    setSyncStatus("syncing");
    const now=new Date().toISOString();
    setLastUpdated(now);localStorage.setItem("asset_last_updated",now);
    syncTimer.current=setTimeout(async()=>{
      const ok=await syncToGoogleDrive(newData);
      setSyncStatus(ok?"success":"error");setTimeout(()=>setSyncStatus("idle"),3000);
    },1500);
  },[]);

  const loadFromDrive=useCallback(async()=>{
    setSyncStatus("loading");
    const loaded=await loadFromGoogleDrive();
    if(loaded && typeof loaded==="object" && !Array.isArray(loaded)){
      const keys=["stocks","bank","fixed","mortgage","insurance","expense","travel"];
      const merged={};
      keys.forEach(k=>{
        const remote=loaded[k];
        // 遠端有資料才用遠端，否則保留 localStorage 的資料
        if(Array.isArray(remote) && remote.length > 0){
          merged[k]=remote;
        } else {
          try{ merged[k]=JSON.parse(localStorage.getItem("asset_data"))?.[k]||[]; }catch{ merged[k]=[]; }
        }
      });
      const clean=dedupeData({...DEFAULT_DATA,...merged});
      setData(clean);
      const now=new Date().toISOString();
      setLastUpdated(now);
      localStorage.setItem("asset_last_updated",now);
      localStorage.setItem("asset_data",JSON.stringify(clean));
      setSyncStatus("success");
      setCloudLoaded(true);
    } else {
      console.error("loadFromDrive: GAS 回傳格式異常，保留本地資料", loaded);
      setSyncStatus("error");
    }
    setTimeout(()=>setSyncStatus("idle"),3000);
  },[]);



  const handleUnlock=()=>{sessionStorage.setItem("asset_unlocked","1");setUnlocked(true);};
  const handleLock=()=>{sessionStorage.removeItem("asset_unlocked");setUnlocked(false);};
  const updateData=(newData)=>{setData(newData);triggerSync(newData);};
  const addItem=(type,item)=>{const id=Date.now().toString();updateData({...data,[type]:[...(data[type]||[]),{...item,id}]});setModal(null);setEditItem(null);};
  const updateItem=(type,item)=>{updateData({...data,[type]:data[type].map(r=>r.id===item.id?item:r)});setModal(null);setEditItem(null);};
  const deleteItem=(type,id)=>{if(!window.confirm("確定要刪除？"))return;updateData({...data,[type]:data[type].filter(r=>r.id!==id)});};

  if(!unlocked)return <PasswordScreen onUnlock={handleUnlock}/>;

  // ── filtered helpers ──────────────────────────────────────
  const F=ownerFilter==="all"?null:ownerFilter;
  const filterArr=(arr)=>F?arr.filter(r=>(r.owner||r.payer)===F):arr;

  const allAssets = [...((data && data.stocks) || []), ...((data && data.bank) || []), ...((data && data.fixed) || [])];
  const filteredAssets = data ? filterArr(allAssets) : [];


  // TWD conversion helpers for bank/fixed
  const bankTWD=(arr,owner)=>(arr||[]).filter(r=>!owner||r.owner===owner).reduce((s,r)=>s+toTWD(r.amount,r.currency,r.exchangeRate),0);
  const fixedTWD=(arr,owner)=>(arr||[]).filter(r=>!owner||r.owner===owner).reduce((s,r)=>s+toTWD(r.amount,r.currency,r.exchangeRate),0);

  // 儲蓄險＋壽險：已繳金額算資產（TWD: 直接用，USD: 需匯率）
  const ASSET_INS_TYPES=["儲蓄險","壽險"];
  const savingsInsuranceAsset=(arr,owner)=>(arr||[]).filter(r=>ASSET_INS_TYPES.includes(r.type)&&(!owner||r.owner===owner)).reduce((s,r)=>{
    // 優先用 periodAmount×期數；若 periodAmount 空但已繳完，直接用 amount
    let paidAmt=0;
    if(Number(r.periodAmount)){
      const ep=r.status==="已繳完"?(Number(r.totalPeriods)||Number(r.paidPeriods)||0):(Number(r.paidPeriods)||0);
      paidAmt=ep*(Number(r.periodAmount)||0);
    } else if(r.status==="已繳完"&&Number(r.amount)){
      paidAmt=Number(r.amount);
    }
    if(!paidAmt) return s;
    if(r.currency==="USD") return s+toTWD(paidAmt,"USD",r.exchangeRateIns||30);
    return s+paidAmt;
  },0);

  // 房貸不計入資產（僅追蹤負債）

  const totalAssets=(filterArr([...data.stocks,...data.bank,...data.fixed])).reduce((s,r)=>{
    const t=r.currency?toTWD(r.amount,r.currency,r.exchangeRate):Number(r.amount)||0;
    return s+t;
  },0)+savingsInsuranceAsset(filterArr(data.insurance));
  const KKTotal=[...filterArr(data.stocks)].reduce((s,r)=>s+(Number(r.amount)||0),0)+bankTWD(filterArr(data.bank),"KK")+fixedTWD(filterArr(data.fixed),"KK")+savingsInsuranceAsset(data.insurance,"KK");
  const SSTotal=[...filterArr(data.stocks).filter(r=>r.owner==="SS")].reduce((s,r)=>s+(Number(r.amount)||0),0)+bankTWD(data.bank,"SS")+fixedTWD(data.fixed,"SS")+savingsInsuranceAsset(data.insurance,"SS");
  const childTotal=[...data.stocks.filter(r=>r.owner==="BB")].reduce((s,r)=>s+(Number(r.amount)||0),0)+bankTWD(data.bank,"BB")+fixedTWD(data.fixed,"BB")+savingsInsuranceAsset(data.insurance,"BB");

  // per-person totals used in dashboard
  const personTotal={
    KK:[...data.stocks.filter(r=>r.owner==="KK")].reduce((s,r)=>s+(Number(r.amount)||0),0)+bankTWD(data.bank,"KK")+fixedTWD(data.fixed,"KK")+savingsInsuranceAsset(data.insurance,"KK"),
    SS:[...data.stocks.filter(r=>r.owner==="SS")].reduce((s,r)=>s+(Number(r.amount)||0),0)+bankTWD(data.bank,"SS")+fixedTWD(data.fixed,"SS")+savingsInsuranceAsset(data.insurance,"SS"),
    "BB":[...data.stocks.filter(r=>r.owner==="BB")].reduce((s,r)=>s+(Number(r.amount)||0),0)+bankTWD(data.bank,"BB")+fixedTWD(data.fixed,"BB")+savingsInsuranceAsset(data.insurance,"BB"),
  };
  const grandTotal=Object.values(personTotal).reduce((s,v)=>s+v,0);

  const mortgages=data.mortgage||[];
  const filteredMortgages=filterArr(mortgages);
  const mortgageMonthly=filteredMortgages.reduce((s,r)=>s+(Number(r.monthlyPayment)||0),0);
  const mortgageRemaining=filteredMortgages.reduce((s,r)=>s+Math.max(0,(Number(r.totalMonths)||0)-(Number(r.paidMonths)||0))*(Number(r.monthlyPayment)||0),0);

  const expenses=data.expense||[];
  const filteredExpenses=filterArr(expenses);
  const monthlyTotal=filteredExpenses.reduce((s,r)=>s+toMonthly(r.amount,r.freq),0);
  const yearlyTotal=filteredExpenses.reduce((s,r)=>s+(r.freq==="單次"?0:toMonthly(r.amount,r.freq)*12),0);
  const travels=data.travel||[];
  const filteredTravels=filterArr(travels);
  const travelTotal=filteredTravels.reduce((s,r)=>s+(Number(r.totalAmount)||0),0);

  const syncDot={idle:C.success,syncing:C.accent,success:C.success,error:C.danger,loading:C.accent};
  const syncText={idle:"✅ 已上傳雲端",syncing:"⏫ 上傳中…",success:"✅ 已上傳雲端",error:"❌ 上傳失敗",loading:"⏬ 下載中…"};

  // ── Row field definitions ─────────────────────────────────
  const stockFields={
    ownerTag:r=><OwnerTag owner={r.owner}/>,title:r=>r.name||"投資",
    badge:r=><Tag color={r.type==="基金"?"#5B8FA8":C.brownLight}>{r.type||"股票"}</Tag>,
    mainAmount:r=>formatTWD(r.amount),
    profitTag:r=>{
      if(!r.cost||!r.amount)return null;
      const p=(Number(r.amount)||0)-(Number(r.cost)||0);const pct=Number(r.cost)>0?((p/Number(r.cost))*100).toFixed(1):null;
      return <span style={{fontSize:12,fontWeight:700,color:p>=0?C.success:C.danger}}>{p>=0?"▲":"▼"} {pct?(p>=0?"+":"")+pct+"%":""}</span>;
    },
    details:r=>{
      const p=(Number(r.amount)||0)-(Number(r.cost)||0);const pct=r.cost&&Number(r.cost)>0?((p/Number(r.cost))*100).toFixed(1):null;
      return [{label:"類型",value:r.type||"股票"},{label:"目前市值",value:formatTWD(r.amount)},{label:"投入成本",value:r.cost?formatTWD(r.cost):""},{label:"獲利金額",value:r.cost?<span style={{color:p>=0?C.success:C.danger,fontWeight:700}}>{p>=0?"▲ ":"▼ "}{formatTWD(Math.abs(p))}{pct?" ("+(p>=0?"+":"")+pct+"%)":""}</span>:""},{label:"備註",value:r.note}];
    }
  };

  // Bank: show foreign currency + TWD conversion
  const bankFields={
    ownerTag:r=><OwnerTag owner={r.owner}/>,title:r=>(r.bank||"銀行存款")+(r.branch?` ${r.branch}`:""),
    mainAmount:r=>{
      if(!r.currency||r.currency==="TWD") return formatTWD(r.amount);
      return formatCurrency(r.amount,r.currency);
    },
    subAmount:r=>{
      if(!r.currency||r.currency==="TWD"||!r.exchangeRate) return null;
      return `≈ ${formatTWD(toTWD(r.amount,r.currency,r.exchangeRate))} TWD`;
    },
    details:r=>[
      {label:"分行",value:r.branch||""},
      {label:"帳號末五碼",value:r.account},
      {label:"幣別",value:(r.currency||"TWD")==="TWD"?"TWD":r.currency},
      {label:"存款金額",value:formatCurrency(r.amount,r.currency)},
      {label:"匯率",value:r.exchangeRate&&r.currency!=="TWD"?`1 ${r.currency} = ${r.exchangeRate} TWD`:""},
      {label:"台幣約",value:(r.currency&&r.currency!=="TWD"&&r.exchangeRate)?formatTWD(toTWD(r.amount,r.currency,r.exchangeRate)):""},
    ]
  };

  // Fixed: same foreign currency treatment
  const fixedFields={
    ownerTag:r=><OwnerTag owner={r.owner}/>,
    title:r=>(r.bank||"定存")+(r.branch?` ${r.branch}`:""),
    badge:r=>{
      const parts=[];
      if(r.startDate) parts.push(<Tag key="s" color={C.textMuted}>起:{r.startDate}</Tag>);
      if(r.endDate) parts.push(<Tag key="e" color={C.brownLight}>到:{r.endDate}</Tag>);
      if(r.rate) parts.push(<Tag key="r" color={C.success}>{r.rate}%</Tag>);
      return parts.length?<span style={{display:"flex",gap:4,flexWrap:"wrap"}}>{parts}</span>:null;
    },
    mainAmount:r=>{
      if(!r.currency||r.currency==="TWD") return formatTWD(r.amount);
      return formatCurrency(r.amount,r.currency);
    },
    subAmount:r=>{
      if(!r.currency||r.currency==="TWD"||!r.exchangeRate) return null;
      return `≈ ${formatTWD(toTWD(r.amount,r.currency,r.exchangeRate))} TWD`;
    },
    details:r=>[
      {label:"分行",value:r.branch||""},
      {label:"幣別",value:(r.currency||"TWD")==="TWD"?"TWD":r.currency},
      {label:"本金",value:formatCurrency(r.amount,r.currency)},
      {label:"匯率",value:r.exchangeRate&&r.currency!=="TWD"?`1 ${r.currency} = ${r.exchangeRate} TWD`:""},
      {label:"台幣約",value:(r.currency&&r.currency!=="TWD"&&r.exchangeRate)?formatTWD(toTWD(r.amount,r.currency,r.exchangeRate)):""},
      {label:"利率",value:r.rate?`${r.rate}%`:""},{label:"起始日",value:r.startDate},{label:"到期日",value:r.endDate},
    ]
  };

  const insFields={
    ownerTag:r=><OwnerTag owner={r.owner}/>,title:r=>r.product||r.company||"保單",
    mainAmount:r=>{
      const amt=r.periodAmount||r.premium;
      if(!amt) return "—";
      return (r.currency&&r.currency!=="TWD"?"$ ":"")+Number(amt).toLocaleString()+(r.currency&&r.currency!=="TWD"?" "+r.currency:" TWD");
    },
    badge:r=>{
      const isSavings=r.type==="儲蓄險";
      return <span style={{display:"flex",gap:4}}>
        <Tag color={isSavings?C.success:C.accent}>{r.type||"壽險"}</Tag>
        <Tag color={r.status==="已繳完"?C.success:C.textMuted}>{r.status}</Tag>
      </span>;
    },
    amountColor:C.brownLight,
    details:r=>{
      const isSavings=r.type==="儲蓄險";
      const rem=Math.max(0,(Number(r.totalPeriods)||0)-(Number(r.paidPeriods)||0));
      const paidAmt=(Number(r.paidPeriods)||0)*(Number(r.periodAmount)||0);
      const remAmt=rem*(Number(r.periodAmount)||0);
      const curr=r.currency&&r.currency!=="TWD"?r.currency:"TWD";
      return [
        {label:"保險公司",value:r.company},
        {label:"種類",value:r.type},
        {label:"幣別",value:curr==="TWD"?"TWD":curr},
        {label:"保額",value:r.amount?`${curr==="TWD"?"$ ":"$ "}${Number(r.amount).toLocaleString()} ${curr==="TWD"?"":curr}`:""},
        {label:"每期金額",value:r.periodAmount?`${curr==="TWD"?"$ ":"$ "}${Number(r.periodAmount).toLocaleString()} ${curr==="TWD"?"":curr}`:""},
        {label:"總繳期數",value:r.totalPeriods?`${r.totalPeriods} 期`:""},
        {label:"已繳期數",value:r.paidPeriods?`${r.paidPeriods} 期`:""},
        {label:"未繳期數",value:rem>0?`${rem} 期`:""},
        {label:"尚需繳納",value:remAmt?<span style={{color:C.danger,fontWeight:700}}>{curr==="TWD"?"$ ":"$ "}{remAmt.toLocaleString()} {curr==="TWD"?"":curr}</span>:""},
        isSavings?{label:"已繳資產值（含外幣換算）",value:paidAmt?<span style={{color:C.success,fontWeight:700}}>$ {toTWD(paidAmt,curr,r.exchangeRateIns).toLocaleString()}<span style={{color:C.textMuted,fontSize:11,fontWeight:400,marginLeft:4}}>{curr!=="TWD"?` (原幣 ${paidAmt.toLocaleString()} ${curr})`:"TWD"}</span></span>:""}:{label:"",value:""},
        {label:"被保險人",value:r.insured},
        {label:"最後一期",value:r.lastPaymeTWDate},
        {label:"每年扣款月份",value:r.paymentMonths},
      ];
    }
  };

  const mortgageFields={
    ownerTag:r=><OwnerTag owner={r.owner}/>,
    title:r=>r.houseName||r.bank||"房貸",
    badge:r=>{
      const prog=r.totalMonths&&Number(r.totalMonths)>0?Math.round((Number(r.paidMonths)||0)/Number(r.totalMonths)*100):0;
      return <span style={{display:"flex",gap:4}}><Tag color={C.mortgage}>{prog}% 完成</Tag>{r.bank&&<Tag color={C.textMuted}>{r.bank}</Tag>}</span>;
    },
    mainAmount:r=>formatTWD(r.monthlyPayment),
    subAmount:r=>{
      const rem=Math.max(0,(Number(r.totalMonths)||0)-(Number(r.paidMonths)||0));
      return rem>0?`剩 ${rem} 期`:null;
    },
    amountColor:C.mortgage,
    details:r=>{
      const rem=Math.max(0,(Number(r.totalMonths)||0)-(Number(r.paidMonths)||0));
      const remAmt=rem*(Number(r.monthlyPayment)||0);
      return [
        {label:"房屋名稱",value:r.houseName},
        {label:"銀行",value:r.bank},
        {label:"貸款總額",value:formatTWD(r.totalAmount)},
        {label:"總期數",value:r.totalMonths?`${r.totalMonths} 期`:""},
        {label:"已繳期數",value:r.paidMonths?<span>{r.paidMonths} 期{r.paidMonthsUpdatedAt&&<span style={{color:C.textMuted,fontSize:11,fontWeight:400,marginLeft:6}}>（{r.paidMonthsUpdatedAt} 更新）</span>}</span>:""},
        {label:"剩餘期數",value:rem?`${rem} 期`:""},
        {label:"💰 已繳金額",value:(r.paidMonths&&r.monthlyPayment)?<span style={{color:C.success,fontWeight:700}}>{formatTWD((Number(r.paidMonths)||0)*(Number(r.monthlyPayment)||0))}<span style={{color:C.textMuted,fontSize:11,fontWeight:400,marginLeft:6}}>{r.paidMonths} 期 × {Number(r.monthlyPayment).toLocaleString()}</span></span>:""},
        {label:"⏳ 剩餘還款",value:remAmt?<span style={{color:C.danger,fontWeight:700}}>{formatTWD(remAmt)}<span style={{color:C.textMuted,fontSize:11,fontWeight:400,marginLeft:6}}>{Number(r.monthlyPayment).toLocaleString()} × {rem} 期</span></span>:""},
        {label:"利率",value:r.rate?`${r.rate}%`:""},{label:"起貸日",value:r.startDate},
        {label:"─ 銀行對帳數據 ─",value:""},
        {label:"📌 剩餘本金（銀行）",value:r.remainingPrincipal?<span style={{color:C.mortgage,fontWeight:700}}>{formatTWD(r.remainingPrincipal)}</span>:""},
        {label:"📌 預估剩餘利息",value:(r.remainingPrincipal&&remAmt)?<span style={{color:"#C47A5A",fontWeight:700}}>{formatTWD(Math.max(0,remAmt-(Number(r.remainingPrincipal)||0)))}<span style={{color:C.textMuted,fontSize:11,fontWeight:400,marginLeft:6}}>（剩餘還款 − 剩餘本金）</span></span>:""},
      ];
    }
  };

  const expFields={
    ownerTag:r=><OwnerTag owner={r.payer||"共同"}/>,title:r=>r.name||r.category||"開銷",
    mainAmount:r=>formatTWD(r.amount),badge:r=><span style={{display:"flex",gap:4}}><Tag color={C.expense}>{r.freq}</Tag><Tag color={C.textMuted}>{r.category}</Tag></span>,
    amountColor:C.expense,
    details:r=>[{label:"類別",value:r.category},{label:"繳費頻率",value:r.freq},{label:"每次金額",value:formatTWD(r.amount)},{label:"每月平均",value:r.freq!=="單次"?formatTWD(toMonthly(r.amount,r.freq)):"—"},{label:"備註",value:r.note}]
  };

  const travelFields={
    title:r=>r.destination||"旅行",badge:r=>r.dateRange?<Tag color={C.travel}>{r.dateRange}</Tag>:null,
    mainAmount:r=>formatTWD(r.totalAmount),amountColor:C.travel,

        <div>
          <div style={{fontWeight:900,fontSize:17,color:C.brownDark}}>🏠 家庭資產管理</div>
          {lastUpdated&&<div style={{color:C.textMuted,fontSize:11,marginTop:1}}>更新：{formatDateTime(lastUpdated)}</div>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{display:"flex",alignItems:"center",gap:4}}>

            <span style={{fontSize:11,color:C.textMuted}}>{syncText[syncStatus]}</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
            <button onClick={loadFromDrive} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,color:C.brownLight,padding:"6px 10px",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit"}}>☁️ 載入</button>
            <span style={{fontSize:9,color:C.textMuted,whiteSpace:"nowrap"}}>換裝置時點此</span>
          </div>
          <button onClick={()=>setModal("changePassword")} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,color:C.textLight,padding:"6px 10px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>🔑</button>

        </div>
      </div>

      {/* 載入中全頁遮罩 */}
      {syncStatus==="loading"&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.45)",zIndex:9999,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
        <div style={{width:48,height:48,border:"5px solid rgba(255,255,255,0.3)",borderTop:"5px solid #fff",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}></div>
        <div style={{color:"#fff",fontSize:16,fontWeight:700}}>從雲端載入資料中…</div>
        <div style={{color:"rgba(255,255,255,0.7)",fontSize:13}}>GAS 冷啟動約需 3–10 秒，請稍候</div>
      </div>}

      {/* Tabs */}
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,display:"flex",overflowX:"auto",padding:"0 10px"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"12px 11px",border:"none",borderBottom:`3px solid ${tab===t.id?C.brown:"transparent"}`,background:"none",color:tab===t.id?C.brown:C.textMuted,fontWeight:tab===t.id?800:500,cursor:"pointer",fontSize:11,whiteSpace:"nowrap",fontFamily:"inherit"}}>
            {t.icon} {t.label}
          </button>
        ))}
      </div>

      {/* Owner Filter Bar */}
      <OwnerFilterBar filter={ownerFilter} onChange={setOwnerFilter}/>

      <div style={{padding:"18px 16px",maxWidth:600,margin:"0 auto"}}>

        {/* ── DASHBOARD ── */}
        {tab==="dashboard"&&(<>
          {/* Filter indicator */}
          {ownerFilter!=="all"&&(
            <div style={{background:ownerFilter==="KK"?C.KK+"18":ownerFilter==="SS"?C.SS+"18":C.child+"18",border:`1px solid ${ownerFilter==="KK"?C.KK:ownerFilter==="SS"?C.SS:C.child}44`,borderRadius:12,padding:"8px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{color:ownerFilter==="KK"?C.KK:ownerFilter==="SS"?C.SS:C.child,fontWeight:700,fontSize:13}}>
                {ownerFilter==="KK"?"👨":ownerFilter==="SS"?"👩":"👦"} 顯示：{ownerLabel(ownerFilter)} 的資產
              </span>
              <button onClick={()=>setOwnerFilter("all")} style={{background:"none",border:"none",color:C.textMuted,cursor:"pointer",fontSize:12}}>顯示全部 ✕</button>
            </div>
          )}

          <div style={{...cardStyle,background:`linear-gradient(135deg,${C.brownDark},${C.brownLight})`,color:C.white,border:"none",marginBottom:14}}>
            <div style={{fontSize:12,opacity:0.75,marginBottom:4}}>{ownerFilter==="all"?"家庭總資產":ownerFilter+" 的資產"}</div>
            <div style={{fontSize:30,fontWeight:900,marginBottom:14}}>{formatTWD(ownerFilter==="all"?grandTotal:personTotal[ownerFilter]||0)}</div>
            {ownerFilter==="all"&&<div style={{display:"flex",gap:8}}>
              {[{name:"KK",color:C.KK},{name:"SS",color:C.SS},{name:"BB",color:C.child}].map(({name,color})=>(
                <div key={name} style={{flex:1,background:"rgba(255,255,255,0.15)",borderRadius:10,padding:"10px"}}>
                  <div style={{fontSize:11,opacity:0.8,marginBottom:2}}>{name==="KK"?"👨":name==="SS"?"👩":"👦"} {ownerLabel(name)}</div>
                  <div style={{fontSize:13,fontWeight:800}}>{formatTWD(personTotal[name])}</div>
                  <div style={{fontSize:11,opacity:0.65}}>{grandTotal?Math.round(personTotal[name]/grandTotal*100):0}%</div>
                </div>
              ))}
            </div>}
          </div>

          {/* Asset category cards */}
          {[
            {key:"stocks",label:"📈 股票＆基金",getTotal:()=>filterArr(data.stocks).reduce((s,r)=>s+(Number(r.amount)||0),0)},
            {key:"bank",label:"🏦 存款",getTotal:()=>bankTWD(filterArr(data.bank))},
            {key:"fixed",label:"🔒 定存",getTotal:()=>fixedTWD(filterArr(data.fixed))},

            <div key={key} onClick={()=>setTab(key)} style={{...cardStyle,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>

                <div style={{fontWeight:700,fontSize:14,color:C.brownDark,marginBottom:4}}>{label}</div>
                {ownerFilter==="all"&&<div style={{display:"flex",gap:10}}>
                  <span style={{color:C.KK,fontSize:12}}>KK {formatTWD(key==="bank"?bankTWD(data.bank,"KK"):key==="fixed"?fixedTWD(data.fixed,"KK"):sumBy(data[key],"KK"))}</span>
                  <span style={{color:C.SS,fontSize:12}}>SS {formatTWD(key==="bank"?bankTWD(data.bank,"SS"):key==="fixed"?fixedTWD(data.fixed,"SS"):sumBy(data[key],"SS"))}</span>
                  <span style={{color:C.child,fontSize:12}}>BB {formatTWD(key==="bank"?bankTWD(data.bank,"BB"):key==="fixed"?fixedTWD(data.fixed,"BB"):sumBy(data[key],"BB"))}</span>

              </div>
              <div style={{textAlign:"right"}}>
                <div style={{color:C.total,fontWeight:800,fontSize:15}}>{formatTWD(getTotal())}</div>
                <div style={{color:C.textMuted,fontSize:11}}>{filterArr(data[key]).length} 筆 ›</div>
              </div>
            </div>
          ))}

          {/* Insurance cards - split savings+life vs others */}
          {(()=>{
            const savingsArr=filterArr(data.insurance).filter(r=>r.type==="儲蓄險");
            const lifeArr=filterArr(data.insurance).filter(r=>r.type==="壽險");
            const otherArr=filterArr(data.insurance).filter(r=>r.type!=="儲蓄險"&&r.type!=="壽險");
            const assetArr=filterArr(data.insurance).filter(r=>r.type==="儲蓄險"||r.type==="壽險");
            const savingsAsset=savingsInsuranceAsset(filterArr(data.insurance));
            return(<>
              <div onClick={()=>setTab("insurance")} style={{...cardStyle,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <div>
                  <div style={{fontWeight:700,fontSize:14,color:C.brownDark,marginBottom:4}}>🛡️ 儲蓄險＋壽險 <Tag color={C.success}>計入資產</Tag></div>
                  <div style={{color:C.textMuted,fontSize:12}}>{assetArr.length} 張 · 已繳資產值</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{color:C.success,fontWeight:800,fontSize:15}}>{formatTWD(savingsAsset)}</div>
                  <div style={{color:C.textMuted,fontSize:11}}>›</div>
                </div>
              </div>
              {otherArr.length>0&&<div onClick={()=>setTab("insurance")} style={{...cardStyle,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,opacity:0.85}}>
                <div>
                  <div style={{fontWeight:700,fontSize:14,color:C.brownDark,marginBottom:4}}>🛡️ 保障型保單 <Tag color={C.accent}>不計資產</Tag></div>
                  <div style={{color:C.textMuted,fontSize:12}}>{otherArr.length} 張 · 意外/醫療等</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{color:C.textMuted,fontWeight:800,fontSize:15}}>{otherArr.length} 張</div>
                  <div style={{color:C.textMuted,fontSize:11}}>›</div>
                </div>
              </div>}
            </>);
          })()}

          {/* Bank foreign currency detail in dashboard */}
          {data.bank.some(r=>r.currency&&r.currency!=="TWD")&&(
            <div style={{...cardStyle,marginBottom:10,padding:"14px 16px"}}>
              <div style={{fontSize:13,color:C.textLight,fontWeight:700,marginBottom:8}}>🌏 外幣存款明細</div>
              {data.bank.filter(r=>r.currency&&r.currency!=="TWD").filter(r=>ownerFilter==="all"||r.owner===ownerFilter).map(r=>(
                <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <OwnerTag owner={r.owner}/>
                    <span style={{fontSize:13,color:C.text}}>{r.bank}</span>
                    <Tag color={C.travel}>{r.currency}</Tag>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:13,fontWeight:700,color:C.brownDark}}>{formatCurrency(r.amount,r.currency)}</div>
                    {r.exchangeRate&&<div style={{fontSize:11,color:C.textMuted}}>≈ {formatTWD(toTWD(r.amount,r.currency,r.exchangeRate))}</div>}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Mortgage card */}
          <div onClick={()=>setTab("mortgage")} style={{...cardStyle,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>

              <div style={{fontWeight:700,fontSize:14,color:C.brownDark,marginBottom:4}}>🏠 房貸 <Tag color={C.mortgage}>不計資產</Tag></div>
              <div style={{color:C.textMuted,fontSize:12}}>剩餘本金：<span style={{color:C.danger,fontWeight:700}}>{formatTWD(filteredMortgages.reduce((s,r)=>s+(Number(r.remainingPrincipal)||0),0)||mortgageRemaining)}</span></div>
            </div>
            <div style={{textAlign:"right"}}><div style={{color:C.mortgage,fontWeight:800,fontSize:15}}>每月 {formatTWD(mortgageMonthly)}</div><div style={{color:C.textMuted,fontSize:11}}>{filteredMortgages.length} 筆 ›</div></div>
          </div>

          <div onClick={()=>setTab("expense")} style={{...cardStyle,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div><div style={{fontWeight:700,fontSize:14,color:C.brownDark,marginBottom:4}}>💸 固定開銷</div><div style={{color:C.textMuted,fontSize:12}}>年度約 {formatTWD(yearlyTotal)}</div></div>
            <div style={{textAlign:"right"}}><div style={{color:C.expense,fontWeight:800,fontSize:15}}>每月 {formatTWD(monthlyTotal)}</div><div style={{color:C.textMuted,fontSize:11}}>{filteredExpenses.length} 筆 ›</div></div>
          </div>

          <div onClick={()=>setTab("travel")} style={{...cardStyle,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div><div style={{fontWeight:700,fontSize:14,color:C.brownDark,marginBottom:4}}>✈️ 出國紀錄</div><div style={{color:C.textMuted,fontSize:12}}>共 {filteredTravels.length} 次出遊</div></div>
            <div style={{textAlign:"right"}}><div style={{color:C.travel,fontWeight:800,fontSize:15}}>{formatTWD(travelTotal)}</div><div style={{color:C.textMuted,fontSize:11}}>累計花費 ›</div></div>
          </div>

          {lastUpdated&&<div style={{textAlign:"center",color:C.textMuted,fontSize:12,marginTop:4,padding:"10px",background:C.card,borderRadius:10,border:`1px solid ${C.border}`}}>🕐 最後更新：{formatDateTime(lastUpdated)}</div>}
          {!cloudLoaded&&<div style={{textAlign:"center",fontSize:13,marginTop:8,padding:"14px 16px",background:"#FFF3CD",borderRadius:12,border:"2px solid #FBBF24",color:"#92400E",lineHeight:1.7}}>
            ⚠️ <strong>每次開啟請先從雲端載入最新資料</strong><br/>
            <span style={{fontSize:12}}>按右上角 <strong>☁️ 載入</strong>，確認右上角顯示「✅ 已上傳雲端」後再進行編輯</span>
          </div>}
        </>)}

        {/* ── STOCKS ── */}
        {tab==="stocks"&&(<SectionHeader ownerFilter={ownerFilter} title="📈 股票 ＆ 基金" onAdd={()=>{setEditItem(null);setModal("stocks")}}>
          <div style={{display:"flex",gap:10,marginBottom:10}}><StatPill label="👨 KK" value={sumBy(data.stocks,"KK")} color={C.KK}/><StatPill label="👩 SS" value={sumBy(data.stocks,"SS")} color={C.SS}/><StatPill label="👦 BB" value={sumBy(data.stocks,"BB")} color={C.child}/><StatPill label="合計" value={sumBy(data.stocks)} color={C.total}/></div>
          <SortBar tab="stocks" sortConfig={sortConfig} onSort={toggleSort} fields={[{key:"name",label:"名稱"},{key:"amount",label:"市值"},{key:"profit",label:"獲利"},{key:"owner",label:"持有人"}]}/>
          {(()=>{const sc=sortConfig["stocks"];const sorted=applySortConfig(filterArr(data.stocks),sc,r=>sc&&sc.field==="name"?r.name:sc&&sc.field==="owner"?r.owner:sc&&sc.field==="profit"?(Number(r.amount)||0)-(Number(r.cost)||0):Number(r.amount)||0);return !sorted.length?<div style={{textAlign:"center",color:C.textMuted,padding:"40px 0",fontSize:14}}>尚無投資紀錄</div>:sorted.map(r=><RowCard key={r.id} row={r} fields={stockFields} onEdit={r=>{setEditItem(r);setModal("stocks")}} onDelete={id=>deleteItem("stocks",id)}/>);})()}
        </SectionHeader>)}

        {/* ── BANK + FIXED 合頁 ── */}
        {tab==="bank"&&<BankFixedTab data={data} ownerFilter={ownerFilter} sortConfig={sortConfig} toggleSort={toggleSort} filterArr={filterArr} setEditItem={setEditItem} setModal={setModal} deleteItem={deleteItem} bankFields={bankFields} fixedFields={fixedFields} bankTWD={bankTWD} fixedTWD={fixedTWD}/>}

        {tab==="mortgage"&&(<SectionHeader ownerFilter={ownerFilter} title="🏠 房貸" onAdd={()=>{setEditItem(null);setModal("mortgage")}} btnColor={C.mortgage}>
          {(()=>{
            const totalRemPrincipal=filteredMortgages.reduce((s,r)=>s+(Number(r.remainingPrincipal)||0),0);
            const totalRemPayment=filteredMortgages.reduce((s,r)=>s+(Number(r.remainingTotalPayment)||0),0);
            const totalEstInterest=filteredMortgages.reduce((s,r)=>{
              if(r.estimatedInterest) return s+(Number(r.estimatedInterest)||0);
              if(r.remainingTotalPayment&&r.remainingPrincipal) return s+Math.max(0,(Number(r.remainingTotalPayment)||0)-(Number(r.remainingPrincipal)||0));
              return s;
            },0);
            const overallPct=filteredMortgages.reduce((s,r)=>s+(Number(r.totalMonths)||0),0)>0?
              Math.round(filteredMortgages.reduce((s,r)=>s+(Number(r.paidMonths)||0),0)/filteredMortgages.reduce((s,r)=>s+(Number(r.totalMonths)||0),0)*100):0;
            const totalLoaned=filteredMortgages.reduce((s,r)=>s+(Number(r.totalAmount)||0),0);
            const totalPaidAmount=filteredMortgages.reduce((s,r)=>s+(Number(r.paidMonths)||0)*(Number(r.monthlyPayment)||0),0);
            const totalDownPayment=filteredMortgages.reduce((s,r)=>s+(Number(r.downPayment)||0),0);
            const grandTotalPaid=totalPaidAmount+totalDownPayment;
            return(<>
              {/* Overview */}
              <div style={{background:`linear-gradient(135deg,${C.mortgage}22,${C.mortgage}08)`,border:`1px solid ${C.mortgage}33`,borderRadius:14,padding:"16px",marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{fontWeight:800,color:C.mortgage,fontSize:14}}>📊 房貸總覽</div>
                  <Tag color={C.mortgage}>不列入資產</Tag>
                </div>
                <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
                  <StatPill label="每月還款" value={mortgageMonthly} color={C.mortgage}/>
                  {totalRemPrincipal>0&&<StatPill label="📌 剩餘本金" value={totalRemPrincipal} color={C.danger}/>}
                  {totalRemPrincipal===0&&<StatPill label="⏳ 試算剩餘" value={mortgageRemaining} color={C.danger}/>}
                  {totalEstInterest>0&&<StatPill label="💸 預估剩餘利息" value={totalEstInterest} color={"#C47A5A"}/>}
                </div>
                {(totalPaidAmount>0||totalDownPayment>0)&&(
                  <div style={{background:C.success+"18",border:`1px solid ${C.success}44`,borderRadius:12,padding:"12px 16px",marginBottom:4}}>
                    <div style={{fontSize:12,color:C.success,fontWeight:700,marginBottom:8}}>💰 已繳總金額</div>
                    {filteredMortgages.filter(r=>r.paidMonths&&r.monthlyPayment||r.downPayment||r.housePrice).map(r=>{
                      const mortgagePaid=(Number(r.paidMonths)||0)*(Number(r.monthlyPayment)||0);
                      const dp=Number(r.downPayment)||0;
                      const hp=Number(r.housePrice)||0;
                      return(
                        <div key={r.id} style={{marginBottom:10,paddingBottom:10,borderBottom:`1px dashed ${C.success}33`}}>
                          <div style={{fontSize:13,color:C.text,fontWeight:700,marginBottom:5}}>{r.houseName||r.bank||"房貸"}{hp>0&&<span style={{color:C.textMuted,fontSize:11,fontWeight:400,marginLeft:8}}>購買金額 {formatTWD(hp)}</span>}</div>
                          {dp>0&&(
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                              <span style={{fontSize:12,color:C.textMuted}}>自備款</span>
                              <span style={{fontSize:12,color:C.success,fontWeight:600}}>{formatTWD(dp)}</span>
                            </div>
                          )}
                          {mortgagePaid>0&&(
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                              <span style={{fontSize:12,color:C.textMuted}}>房貸已繳 <span style={{fontSize:11}}>（{r.paidMonths} 期 × {Number(r.monthlyPayment).toLocaleString()}）</span></span>
                              <span style={{fontSize:12,color:C.success,fontWeight:600}}>{formatTWD(mortgagePaid)}</span>
                            </div>
                          )}
                          {(dp>0||mortgagePaid>0)&&(
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4,paddingTop:4,borderTop:`1px solid ${C.success}22`}}>
                              <span style={{fontSize:12,color:C.success,fontWeight:700}}>小計</span>
                              <span style={{fontSize:13,color:C.success,fontWeight:800}}>{formatTWD(dp+mortgagePaid)}</span>
                            </div>
                          )}
                        </div>
                      );
                    })}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}>
                      <div>
                        <div style={{fontSize:12,color:C.success,fontWeight:700}}>總計已付出</div>
                        {totalDownPayment>0&&<div style={{fontSize:11,color:C.textMuted}}>含自備款 {formatTWD(totalDownPayment)}</div>}
                      </div>
                      <span style={{fontSize:18,fontWeight:900,color:C.success}}>{formatTWD(grandTotalPaid)}</span>
                    </div>
                  </div>
                )}
                {filteredMortgages.length>0&&(<>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:12,color:C.textLight,fontWeight:600}}>整體還款進度</span>
                    <span style={{fontSize:12,color:C.mortgage,fontWeight:700}}>{overallPct}% 完成</span>
                  </div>
                  <div style={{background:C.border,borderRadius:4,height:8,marginBottom:4}}>
                    <div style={{background:`linear-gradient(90deg,${C.success},${C.mortgage})`,height:"100%",borderRadius:4,width:`${overallPct}%`,transition:"width 0.5s"}}></div>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.textMuted}}>
                    <span>貸款總額 {formatTWD(totalLoaned)}</span>
                    {totalRemPayment>0&&<span>剩餘總還款 {formatTWD(totalRemPayment)}</span>}
                  </div>
                </>)}
              </div>
              {!filteredMortgages.length?<div style={{textAlign:"center",color:C.textMuted,padding:"40px 0",fontSize:14}}>尚無房貸紀錄</div>
                :filteredMortgages.map(r=><RowCard key={r.id} row={r} fields={mortgageFields} onEdit={r=>{setEditItem(r);setModal("mortgage")}} onDelete={id=>deleteItem("mortgage",id)}/>)}
            </>);
          })()}
        </SectionHeader>)}

        {/* ── INSURANCE ── */}
        {tab==="insurance"&&(<SectionHeader ownerFilter={ownerFilter} title="🛡️ 保單" onAdd={()=>{setEditItem(null);setModal("insurance")}}>
          {(()=>{
            const savingsArr=filterArr(data.insurance).filter(r=>r.type==="儲蓄險");
            const lifeArr=filterArr(data.insurance).filter(r=>r.type==="壽險");
            const otherArr=filterArr(data.insurance).filter(r=>r.type!=="儲蓄險"&&r.type!=="壽險");
            const savingsTWD=savingsInsuranceAsset(savingsArr);
            const savingsUSD=savingsArr.filter(r=>r.currency==="USD").reduce((s,r)=>s+(Number(r.paidPeriods)||0)*(Number(r.periodAmount)||0),0);
            const lifeUSD=lifeArr.filter(r=>r.currency==="USD").reduce((s,r)=>s+(Number(r.paidPeriods)||0)*(Number(r.periodAmount)||0),0);
            const lifeTWD=savingsInsuranceAsset(lifeArr);
            return(<>
              {/* 儲蓄險 section */}
              <div style={{background:C.success+"10",border:`1px solid ${C.success}33`,borderRadius:14,padding:"14px 16px",marginBottom:14}}>
                <div style={{fontWeight:800,fontSize:14,color:C.success,marginBottom:10}}>💰 儲蓄險（計入資產）</div>
                <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
                  <StatPill label="已繳資產 TWD" value={savingsTWD} color={C.success}/>
                  {savingsUSD>0&&<StatPill label={`已繳 USD`} value={savingsUSD} color={C.KK}/>}
                  <div style={{background:C.card,borderRadius:14,padding:"13px 16px",border:`1px solid ${C.border}`}}>
                    <div style={{color:C.textMuted,fontSize:11,fontWeight:600,marginBottom:3}}>張數</div>
                    <div style={{color:C.success,fontSize:15,fontWeight:800}}>{savingsArr.length} 張</div>
                  </div>
                </div>
                {!savingsArr.length?<div style={{textAlign:"center",color:C.textMuted,padding:"20px 0",fontSize:14}}>尚無儲蓄險</div>:savingsArr.map(r=><InsRowCard key={r.id} row={r} fields={insFields} onEdit={r=>{setEditItem(r);setModal("insurance")}} onDelete={id=>deleteItem("insurance",id)}/>)}
              </div>

              {/* 壽險 section */}
              <div style={{background:C.KK+"10",border:`1px solid ${C.KK}33`,borderRadius:14,padding:"14px 16px",marginBottom:14}}>
                <div style={{fontWeight:800,fontSize:14,color:C.KK,marginBottom:10}}>🛡️ 壽險（計入資產）</div>
                <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
                  <StatPill label="已繳資產 TWD" value={lifeTWD} color={C.KK}/>
                  {lifeUSD>0&&<StatPill label={`已繳 USD`} value={lifeUSD} color={C.KK}/>}
                  <div style={{background:C.card,borderRadius:14,padding:"13px 16px",border:`1px solid ${C.border}`}}>
                    <div style={{color:C.textMuted,fontSize:11,fontWeight:600,marginBottom:3}}>張數</div>
                    <div style={{color:C.KK,fontSize:15,fontWeight:800}}>{lifeArr.length} 張</div>
                  </div>
                </div>
                {!lifeArr.length?<div style={{textAlign:"center",color:C.textMuted,padding:"20px 0",fontSize:14}}>尚無壽險</div>:lifeArr.map(r=><InsRowCard key={r.id} row={r} fields={insFields} onEdit={r=>{setEditItem(r);setModal("insurance")}} onDelete={id=>deleteItem("insurance",id)}/>)}
              </div>

              {/* 其他保單 section */}
              <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 16px"}}>
                <div style={{fontWeight:800,fontSize:14,color:C.brownDark,marginBottom:10}}>🔐 保障型保單（不計資產）</div>
                <div style={{display:"flex",gap:8,marginBottom:10}}>
                  <Tag color={C.accent}>{otherArr.filter(r=>r.status==="未繳完").length} 張未繳完</Tag>
                  <Tag color={C.success}>{otherArr.filter(r=>r.status==="已繳完").length} 張已繳完</Tag>
                </div>
                {!otherArr.length?<div style={{textAlign:"center",color:C.textMuted,padding:"20px 0",fontSize:14}}>尚無保障型保單</div>:otherArr.map(r=><InsRowCard key={r.id} row={r} fields={insFields} onEdit={r=>{setEditItem(r);setModal("insurance")}} onDelete={id=>deleteItem("insurance",id)}/>)}
              </div>
            </>);
          })()}
        </SectionHeader>)}

        {/* ── EXPENSE ── */}
        {tab==="expense"&&(<SectionHeader ownerFilter={ownerFilter} title="💸 固定開銷" onAdd={()=>{setEditItem(null);setModal("expense")}} btnColor={C.expense}>
          {/* Frequency filter */}
          {(()=>{
            const [freqFilter,setFreqFilter]=[expenseFreqFilter,setExpenseFreqFilter];
            const freqFiltered=freqFilter==="全部"?filteredExpenses:filteredExpenses.filter(r=>r.freq===freqFilter);
            const freqTotal=freqFiltered.reduce((s,r)=>s+(Number(r.amount)||0),0);
            const freqMonthly=freqFiltered.reduce((s,r)=>s+toMonthly(r.amount,r.freq),0);
            return(<>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:12,color:C.textLight,fontWeight:600,marginBottom:8}}>按繳費頻率篩選</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {["全部",...EXPENSE_FREQ].map(f=>(
                    <button key={f} onClick={()=>setExpenseFreqFilter(f)} style={{padding:"6px 12px",borderRadius:20,border:`1.5px solid ${freqFilter===f?C.expense:C.border}`,background:freqFilter===f?C.expense+"18":C.bg,color:freqFilter===f?C.expense:C.textMuted,fontWeight:freqFilter===f?800:500,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>
                      {f}
                    </button>
                  ))}
                </div>
              </div>
              {freqFilter!=="全部"&&(
                <div style={{background:C.expense+"15",border:`1px solid ${C.expense}44`,borderRadius:12,padding:"12px 16px",marginBottom:12}}>
                  <div style={{fontSize:13,color:C.expense,fontWeight:700,marginBottom:2}}>{freqFilter} 共 {freqFiltered.length} 筆</div>
                  <div style={{fontSize:15,color:C.expense,fontWeight:800}}>合計：{formatTWD(freqTotal)}</div>
                  {freqFilter!=="單次"&&<div style={{fontSize:12,color:C.textMuted,marginTop:2}}>每月平均：{formatTWD(freqMonthly)}</div>}
                </div>
              )}
              <div style={{display:"flex",gap:10,marginBottom:12}}><StatPill label="每月支出" value={monthlyTotal} color={C.expense}/><StatPill label="年度預估" value={yearlyTotal} color={C.danger}/></div>
              {freqFiltered.length>0&&(
                <div style={{...cardStyle,marginBottom:14,padding:"14px 16px"}}>
                  <div style={{fontSize:13,color:C.textLight,fontWeight:600,marginBottom:10}}>按類別（每月）</div>
                  {Object.entries(freqFiltered.reduce((acc,r)=>{const m=toMonthly(r.amount,r.freq);acc[r.category]=(acc[r.category]||0)+m;return acc;},{})).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>(
                    <div key={cat} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <span style={{color:C.text,fontSize:13}}>{cat}</span>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{height:6,borderRadius:3,background:C.expense+"33",width:60,overflow:"hidden"}}><div style={{height:"100%",borderRadius:3,background:C.expense,width:`${Math.min(100,monthlyTotal?amt/monthlyTotal*100:0)}%`}}></div></div>
                        <span style={{color:C.expense,fontWeight:700,fontSize:13,minWidth:65,textAlign:"right"}}>{formatTWD(amt)}</span>
                      </div>
                    </div>
                  ))}
                </div>
              )}
              <SortBar tab="expense" sortConfig={sortConfig} onSort={toggleSort} fields={[{key:"name",label:"名稱"},{key:"amount",label:"金額"},{key:"freq",label:"頻率"},{key:"category",label:"類別"}]}/>
              {(()=>{const sc=sortConfig["expense"];const freqOrder=["每月","每季","每半年","每年","單次"];const sorted=applySortConfig(freqFiltered,sc,r=>sc&&sc.field==="name"?r.name:sc&&sc.field==="freq"?freqOrder.indexOf(r.freq):sc&&sc.field==="category"?r.category:Number(r.amount)||0);return !sorted.length?<div style={{textAlign:"center",color:C.textMuted,padding:"40px 0",fontSize:14}}>尚無符合的固定開銷紀錄</div>:sorted.map(r=><RowCard key={r.id} row={r} fields={expFields} onEdit={r=>{setEditItem(r);setModal("expense")}} onDelete={id=>deleteItem("expense",id)}/>);})()}
            </>);
          })()}
        </SectionHeader>)}

        {/* ── TRAVEL ── */}
        {tab==="travel"&&(<SectionHeader ownerFilter={ownerFilter} title="✈️ 出國紀錄" onAdd={()=>{setEditItem(null);setModal("travel")}} btnColor={C.travel}>
          <div style={{display:"flex",gap:10,marginBottom:14}}>
            <StatPill label="出遊次數" value={filteredTravels.length} color={C.travel}/>
            <StatPill label="累計花費" value={travelTotal} color={C.travel}/>
            <StatPill label="平均每次" value={filteredTravels.length?Math.round(travelTotal/filteredTravels.length):0} color={C.textLight}/>
          </div>
          {!filteredTravels.length?<div style={{textAlign:"center",color:C.textMuted,padding:"40px 0",fontSize:14}}>尚無出國紀錄</div>
            :[...filteredTravels].sort((a,b)=>(b.dateRange||"").localeCompare(a.dateRange||"")).map(r=><RowCard key={r.id} row={r} fields={travelFields} onEdit={r=>{setEditItem(r);setModal("travel")}} onDelete={id=>deleteItem("travel",id)}/>)}
        </SectionHeader>)}

      </div>

      {/* Modals */}
      {modal==="stocks"&&<StockModal initial={editItem} defaultOwner={ownerFilter==="all"?"KK":ownerFilter} onClose={()=>{setModal(null);setEditItem(null)}} onSave={item=>editItem?updateItem("stocks",item):addItem("stocks",item)}/>}
      {modal==="bank"&&<BankModal initial={editItem} defaultOwner={ownerFilter==="all"?"KK":ownerFilter} onClose={()=>{setModal(null);setEditItem(null)}} onSave={item=>editItem?updateItem("bank",item):addItem("bank",item)}/>}
      {modal==="fixed"&&<FixedModal initial={editItem} defaultOwner={ownerFilter==="all"?"KK":ownerFilter} onClose={()=>{setModal(null);setEditItem(null)}} onSave={item=>editItem?updateItem("fixed",item):addItem("fixed",item)}/>}
      {modal==="mortgage"&&<MortgageModal initial={editItem} defaultOwner={ownerFilter==="all"?"KK":ownerFilter} onClose={()=>{setModal(null);setEditItem(null)}} onSave={item=>editItem?updateItem("mortgage",item):addItem("mortgage",item)}/>}
      {modal==="insurance"&&<InsuranceModal initial={editItem} defaultOwner={ownerFilter==="all"?"KK":ownerFilter} onClose={()=>{setModal(null);setEditItem(null)}} onSave={item=>editItem?updateItem("insurance",item):addItem("insurance",item)}/>}
      {modal==="expense"&&<ExpenseModal initial={editItem} defaultOwner={ownerFilter==="all"?"共同":ownerFilter} onClose={()=>{setModal(null);setEditItem(null)}} onSave={item=>editItem?updateItem("expense",item):addItem("expense",item)}/>}
      {modal==="travel"&&<TravelModal initial={editItem} onClose={()=>{setModal(null);setEditItem(null)}} onSave={item=>editItem?updateItem("travel",item):addItem("travel",item)}/>}
      {modal==="changePassword"&&<ChangePasswordModal onClose={()=>{setModal(null);setPwChanged(false)}} onSave={()=>{setModal(null);setPwChanged(true);setTimeout(()=>setPwChanged(false),3000);}}/>}

      {pwChanged&&(
        <div style={{position:"fixed",bottom:30,left:"50%",transform:"translateX(-50%)",background:C.brownDark,color:C.white,padding:"12px 24px",borderRadius:12,fontSize:14,fontWeight:700,zIndex:2000,boxShadow:"0 4px 16px rgba(0,0,0,0.2)"}}>
          ✅ 密碼已更新成功
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
